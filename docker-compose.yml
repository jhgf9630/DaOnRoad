# ── DaOnRoad — Docker Compose ─────────────────────────────────
# 사용법:
#   최초/코드변경: docker compose up -d --build
#   이후 실행:    docker compose up -d
#   로그 확인:    docker compose logs -f
#   종료:         docker compose down
# ──────────────────────────────────────────────────────────────

services:

  # ── FastAPI 백엔드 ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daonroad-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/.env:/app/.env:ro
      - daonroad-cache:/app/cache
    environment:
      # 컨테이너 내부에서 OSRM 서비스명으로 직접 접근
      - OSRM_BASE_URL=http://osrm:5000
    # ★ OSRM 헬스체크 의존 제거 → 시작만 확인 (osrm이 느려도 백엔드 시작)
    depends_on:
      - osrm
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── OSRM 경로 계산 서버 ──────────────────────────────────────
  osrm:
    image: osrm/osrm-backend:latest
    container_name: daonroad-osrm
    ports:
      - "5001:5000"
    volumes:
      - ./osrm-data:/data:ro
    command: osrm-routed --algorithm mld /data/south-korea-latest.osrm
    restart: unless-stopped
    # ★ wget 없는 이미지이므로 curl 사용, 없으면 healthcheck 제거
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  daonroad-cache:
