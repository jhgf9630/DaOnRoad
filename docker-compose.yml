services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/.env:/app/.env:ro
      - daonroad-cache:/app/cache
    environment:
      - OSRM_BASE_URL=http://osrm:5000
    depends_on:
      - osrm
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  osrm:
    image: osrm/osrm-backend:latest
    ports:
      - "5001:5000"
    volumes:
      - ./osrm-data:/data:ro
    command: osrm-routed --algorithm mld /data/south-korea-latest.osrm
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  daonroad-cache:
