<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DaOnRoad</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#0f0f1a;color:#e0e0e0;display:flex;flex-direction:column;height:100vh;overflow:hidden}

.header{background:linear-gradient(135deg,#1a1a3e,#2d2d6b);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #4444aa;flex-shrink:0}
.logo{font-size:20px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,#7eb3ff,#aa88ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:11px;color:#556688;border-left:1px solid #2a2a5a;padding-left:12px;margin-left:12px}
.api-bar{display:flex;align-items:center;gap:8px;font-size:11px}
.api-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .4s}
.api-dot.on{background:#22cc77;box-shadow:0 0 6px #22cc7788}
.api-dot.off{background:#cc4466;box-shadow:0 0 6px #cc446688}
.api-dot.ing{background:#ffaa33;animation:blink 1s infinite}
.api-lbl{color:#8899bb}.api-lbl.on{color:#22cc77}.api-lbl.off{color:#cc4466}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:370px;background:#12122a;border-right:1px solid #2a2a4a;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.panel{padding:13px 15px;border-bottom:1px solid #1e1e3a}
.ptitle{font-size:12px;font-weight:bold;color:#7eb3ff;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sbadge{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;background:#5533ee;flex-shrink:0}

.fg{margin-bottom:8px}.fg:last-child{margin-bottom:0}
label{display:block;font-size:11px;color:#8899bb;margin-bottom:3px}
input[type=text],input[type=number],input[type=time],select{width:100%;padding:7px 10px;background:#1a1a30;border:1px solid #333360;border-radius:6px;color:#e0e0e0;font-size:12px;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:#5577ff;background:#1e1e3a}
input::placeholder{color:#445566}

/* ── 주소 검색 컴포넌트 ── */
.addr-wrap{position:relative}
.addr-row{display:flex;gap:5px}
.addr-row input{flex:1}
.btn-find{padding:7px 10px;background:#1e1e40;border:1px solid #334466;border-radius:6px;color:#7eb3ff;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.btn-find:hover{background:#2a2a58;border-color:#7eb3ff}
.btn-find:disabled{opacity:.4;cursor:not-allowed}

/* 검색 결과 드롭다운 */
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:#1a1a38;border:1px solid #334466;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:1000;max-height:220px;overflow-y:auto;display:none;margin-top:2px}
.search-dropdown.open{display:block}
.search-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid #222240;transition:background .15s}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:#252550}
.search-item-name{font-size:12px;font-weight:bold;color:#aaccff}
.search-item-addr{font-size:10px;color:#667799;margin-top:1px}
.search-item-cat{font-size:9px;color:#445566;margin-top:1px}
.search-item.selected{background:#1e2a50}
.search-no-result{padding:12px;font-size:11px;color:#556677;text-align:center}
.search-loading{padding:10px 12px;font-size:11px;color:#7eb3ff;text-align:center}

/* 좌표 확인 배지 */
.coord-badge{font-size:10px;margin-top:3px;min-height:14px;color:#556677}
.coord-badge.ok{color:#22cc77}.coord-badge.fail{color:#cc4466}.coord-badge.loading{color:#ffaa33}

.btn{padding:8px 14px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:bold;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#3355ee,#5533ee);color:#fff;width:100%;padding:10px;font-size:13px}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(80,100,255,.4)}
.btn-success{background:linear-gradient(135deg,#1a9955,#22bb66);color:#fff}
.btn-success:hover:not(:disabled){transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid #334466;color:#8899bb}
.btn-outline:hover{border-color:#7eb3ff;color:#7eb3ff}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}

.dropzone{border:2px dashed #2a2a5a;border-radius:10px;padding:15px;text-align:center;cursor:pointer;transition:all .3s;color:#556677}
.dropzone:hover,.dropzone.drag-over{border-color:#5577ff;color:#7eb3ff;background:rgba(85,119,255,.05)}
.dropzone.loaded{border-color:#1a8855;background:rgba(26,136,85,.05);color:#22cc77}

.mini-tbl{width:100%;font-size:10px;border-collapse:collapse}
.mini-tbl th{background:#1a1a38;padding:4px 6px;color:#7eb3ff;border-bottom:1px solid #2a2a4a;position:sticky;top:0;text-align:center}
.mini-tbl td{padding:3px 6px;border-bottom:1px solid #191928;text-align:center;color:#ccc}
.mini-tbl tr:hover td{background:#1a1a38}
.ok{color:#22cc77}.fail{color:#cc4466}

.v-list{display:flex;flex-direction:column;gap:5px}
.v-item{background:#191930;border:1px solid #252545;border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px}
.v-item.editing{border-color:#5577ff;background:#1a1a3a}
.bus-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.v-info{flex:1}
.v-name{font-size:12px;font-weight:bold;color:#aabbee}
.v-detail{font-size:10px;color:#556677;margin-top:1px}
.v-actions{display:flex;gap:3px}
.btn-edit{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;color:#7eb3ff;font-size:12px}
.btn-edit:hover{background:rgba(126,179,255,.15)}
.btn-del{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;color:#cc4466;font-size:12px}
.btn-del:hover{background:rgba(204,68,102,.15)}
.v-edit-form{background:#1a1a3a;border:1px solid #5577ff;border-radius:8px;padding:10px;margin-top:4px}

.progress-bar{height:5px;background:#1a1a38;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#4466ff,#9944ff,#ff44aa);transition:width .6s;border-radius:3px}
.step-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.step-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#4a5a7a}
.step-row.done{color:#22cc77}.step-row.active{color:#7eb3ff;font-weight:bold}

.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sum-card{background:#191930;border:1px solid #252545;border-radius:9px;padding:10px;text-align:center}
.sum-val{font-size:20px;font-weight:bold;color:#7eb3ff;line-height:1}
.sum-lbl{font-size:10px;color:#556677;margin-top:4px}

.off-banner{background:#2e1015;border:1px solid #aa2244;border-radius:8px;padding:10px 12px;font-size:11px;color:#ff6688;line-height:1.7}
.off-banner code{background:#1a0a10;padding:1px 5px;border-radius:3px;font-family:monospace;color:#ff99aa}

.route-panel{background:#0d0d20;border-top:1px solid #1e1e3a;flex-shrink:0}
.rtabs{display:flex;align-items:center;gap:5px;padding:6px 12px;overflow-x:auto;scrollbar-width:none}
.rtabs::-webkit-scrollbar{display:none}
.rtab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:bold;cursor:pointer;border:1px solid #2a2a4a;white-space:nowrap;transition:all .2s;color:#667788;background:#161628}
.rtab:hover{border-color:#5577ff;color:#aabbee}
.rtab.active{color:#fff;border-color:transparent!important}

.map-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#map{flex:1}

.leaflet-popup-content-wrapper{background:#1a1a38!important;border:1px solid #334466!important;color:#dde8ff!important;border-radius:10px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important}
.leaflet-popup-tip{background:#1a1a38!important}
.pop-name{font-size:13px;font-weight:bold;color:#7eb3ff;margin-bottom:4px}
.pop-row{font-size:11px;margin:2px 0;color:#aabbcc}
.pop-time{color:#44dd88;font-size:13px;font-weight:bold}
.pop-bus{font-size:10px;font-weight:bold;padding:2px 7px;border-radius:10px;color:#fff;display:inline-block;margin-bottom:4px}

/* ★ 클러스터 색상 오버라이드 */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(30,30,80,.7)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:rgba(80,100,255,.8)!important;color:#fff!important;font-weight:bold}

.toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-size:12px;z-index:9999;max-width:300px;animation:tIn .3s ease;pointer-events:none;line-height:1.5;white-space:pre-line}
.toast.success{background:#0d2e1a;border:1px solid #22aa66;color:#55ff99}
.toast.error{background:#2e0d14;border:1px solid #aa2244;color:#ff6688}
.toast.info{background:#0d1a2e;border:1px solid #2255aa;color:#55aaff}
.toast.warn{background:#2e220d;border:1px solid #aa7722;color:#ffcc55}
@keyframes tIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.lov{position:fixed;inset:0;background:rgba(5,5,15,.8);display:none;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(3px)}
.lov.show{display:flex}
.lbox{text-align:center;color:#7eb3ff}
.spinner{width:48px;height:48px;border:3px solid #1e1e40;border-top:3px solid #7eb3ff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:#0d0d20}
.sidebar::-webkit-scrollbar-thumb{background:#2a2a50;border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center">
    <div class="logo">DaOnRoad</div>
    <div class="sub">버스 노선 최적화 시스템</div>
  </div>
  <div class="api-bar">
    <div class="api-dot ing" id="apiDot"></div>
    <span class="api-lbl" id="apiLbl">백엔드 시작 중...</span>
    <button class="btn btn-outline btn-xs" onclick="checkApi()">재연결</button>
  </div>
</div>

<div class="main">
<div class="sidebar">

  <div class="panel" id="offWrap" style="display:none;padding:10px 14px">
    <div class="off-banner">
      ⚠️ <b>백엔드 서버에 연결할 수 없습니다.</b><br>
      Electron 앱이 자동으로 시작하지 못했다면<br>
      터미널에서 직접 실행해 주세요:<br>
      <code>cd backend &amp;&amp; python main.py</code>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="panel">
    <div class="ptitle"><span class="sbadge">1</span> 승객 데이터 업로드</div>
    <div class="dropzone" id="dropzone" onclick="triggerFile()">
      <div style="font-size:22px;margin-bottom:4px">📊</div>
      <div id="dzText">Excel 파일 클릭 또는 드래그</div>
      <div style="font-size:10px;color:#445566;margin-top:2px">컬럼: name / address / passenger_count</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <div id="paxPreview"></div>
  </div>

  <!-- STEP 2 -->
  <div class="panel">
    <div class="ptitle"><span class="sbadge">2</span> 차량 설정</div>
    <div style="display:grid;grid-template-columns:1fr 85px;gap:6px;margin-bottom:6px">
      <div class="fg" style="margin:0"><label>버스 ID</label><input type="text" id="vBusId" placeholder="Bus1"></div>
      <div class="fg" style="margin:0"><label>정원(인)</label><input type="number" id="vCap" placeholder="45" min="1" max="200"></div>
    </div>
    <div class="fg">
      <label>출발지</label>
      <div id="addFormAddrWrap"><!-- AddressSearch 컴포넌트 --></div>
    </div>
    <button class="btn btn-outline" id="addVehBtn" onclick="addVehicle()" style="width:100%;padding:7px;font-size:12px;margin-top:2px">+ 차량 추가</button>
    <div style="height:1px;background:#1e1e3a;margin:10px 0"></div>
    <div class="v-list" id="vList">
      <div style="font-size:11px;color:#445566;text-align:center;padding:8px">차량을 추가하세요</div>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="panel">
    <div class="ptitle"><span class="sbadge">3</span> 노선 생성</div>
    <div class="fg">
      <label>🏁 도착지</label>
      <div id="destAddrWrap"><!-- AddressSearch 컴포넌트 --></div>
    </div>
    <div class="fg" style="margin-top:6px">
      <label>⏰ 도착 목표시간</label>
      <input type="time" id="arrivalTime" value="10:00" style="width:140px">
    </div>
    <div style="margin-top:10px">
      <button class="btn btn-primary" id="genBtn" onclick="generateRoutes()">🚀 최적 노선 생성</button>
    </div>
  </div>

  <!-- 진행 -->
  <div class="panel" id="progPanel" style="display:none">
    <div class="ptitle">⏳ 처리 진행</div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#445566;margin-bottom:4px">
      <span id="progLbl">준비 중...</span><span id="progPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="step-list" id="stepList"></div>
  </div>

  <!-- 결과 요약 -->
  <div class="panel" id="resultPanel" style="display:none">
    <div class="ptitle">📋 결과 요약</div>
    <div class="sum-grid" id="sumGrid"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px">
      <button class="btn btn-success" onclick="exportExcel()">📥 Excel 저장</button>
      <button class="btn btn-outline"  onclick="resetAll()">🔄 초기화</button>
    </div>
  </div>

  <!-- 노선 상세 -->
  <div class="panel" id="detailPanel" style="display:none">
    <div class="ptitle">🗺 노선 상세</div>
    <div id="detailList"></div>
  </div>

</div>

<div class="map-area">
  <div id="map"></div>
  <div class="route-panel" id="routePanel" style="display:none">
    <div class="rtabs" id="rtabs"></div>
  </div>
</div>
</div>

<div class="lov" id="lov">
  <div class="lbox">
    <div class="spinner"></div>
    <div style="font-size:14px" id="lovText">처리 중...</div>
    <div style="font-size:11px;color:#445566;margin-top:4px" id="lovSub"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ═══════════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════════
const API    = 'http://127.0.0.1:8000/api';
const HLTH   = 'http://127.0.0.1:8000/health';
const COLORS = ['#4488ff','#ff6633','#33cc77','#ff3366','#aa44ff',
                '#ffbb00','#00ccbb','#ff8833','#77cc33','#cc33ff'];
const STEPS  = ['주소 좌표 확인','Distance Matrix 생성','VRP Solver 실행',
                '도로 시간 정교화','탑승시간 역산','지도 시각화'];

// ═══════════════════════════════════════════════
// Electron IPC
// ═══════════════════════════════════════════════
let ipc=null;
try{ipc=require('electron').ipcRenderer;}catch{
  ipc={invoke:async(ch,d)=>{
    if(ch!=='save-file')return null;
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([new Uint8Array(d.data)])),download:d.defaultName});
    a.click();return{success:true,path:d.defaultName};
  }};
}

// ═══════════════════════════════════════════════
// 앱 상태
// ═══════════════════════════════════════════════
const S={
  passengers:[],vehicles:[],routes:null,destination:null,summary:null,
  online:false,editingId:null,
  // AddressSearch 인스턴스 레지스트리
  addrSearches:{}
};

// ═══════════════════════════════════════════════
// 지도 초기화
// ═══════════════════════════════════════════════
const map=L.map('map',{center:[37.5665,126.9780],zoom:10});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

// 레이어 그룹
const layerPax     = L.markerClusterGroup({maxClusterRadius:40,showCoverageOnHover:false,
  iconCreateFunction:c=>{
    const n=c.getChildCount();
    return L.divIcon({html:`<div style="background:rgba(50,80,220,.85);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4)">${n}</div>`,iconSize:[32,32],iconAnchor:[16,16],className:''});
  }}).addTo(map);
const layerVehicle = L.layerGroup().addTo(map);
const layerDest    = L.layerGroup().addTo(map);
const layerRoute   = L.layerGroup().addTo(map);
const layerStop    = L.markerClusterGroup({maxClusterRadius:30,showCoverageOnHover:false,
  iconCreateFunction:c=>{
    const n=c.getChildCount();
    return L.divIcon({html:`<div style="background:rgba(80,50,180,.85);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)">${n}</div>`,iconSize:[28,28],iconAnchor:[14,14],className:''});
  }}).addTo(map);

const layerPreview = L.layerGroup().addTo(map); // 임시 미리보기 마커 전용
const ML={lines:[]};

// ═══════════════════════════════════════════════
// AddressSearch 컴포넌트
// 각 입력 필드마다 독립 인스턴스 생성
// ═══════════════════════════════════════════════
class AddressSearch {
  constructor(containerId, options={}) {
    this.id        = containerId;
    this.options   = options;   // {placeholder, onSelect, onClear}
    this.selected  = null;      // {lat, lng, address, name}
    this.debounce  = null;
    this._render();
    S.addrSearches[containerId] = this;
  }

  _render() {
    const el = document.getElementById(this.id);
    if (!el) return;
    el.innerHTML = `
      <div class="addr-wrap" id="aw_${this.id}">
        <div class="addr-row">
          <input type="text" id="ai_${this.id}"
            placeholder="${this.options.placeholder||'주소 또는 장소명 입력'}"
            autocomplete="off"
            oninput="S.addrSearches['${this.id}']._onInput(this.value)"
            onkeydown="S.addrSearches['${this.id}']._onKey(event)"
            onfocus="S.addrSearches['${this.id}']._showDropdown()"
          >
          <button class="btn-find" onclick="S.addrSearches['${this.id}']._doSearch()">✅ 확인</button>
        </div>
        <div class="search-dropdown" id="dd_${this.id}"></div>
        <div class="coord-badge" id="cb_${this.id}"></div>
      </div>`;
    // 외부 클릭 시 드롭다운 닫기
    document.addEventListener('click', e=>{
      const wrap=document.getElementById(`aw_${this.id}`);
      if(wrap && !wrap.contains(e.target)) this._closeDropdown();
    });
  }

  _onInput(val) {
    clearTimeout(this.debounce);
    if (!val.trim()) { this._closeDropdown(); this._clearSelected(); return; }
    this.debounce = setTimeout(()=>this._doSearch(), 400);
  }

  _onKey(e) {
    const dd=document.getElementById(`dd_${this.id}`);
    const items=[...dd.querySelectorAll('.search-item')];
    const cur=items.findIndex(i=>i.classList.contains('selected'));
    if(e.key==='ArrowDown'){e.preventDefault();const n=Math.min(cur+1,items.length-1);items.forEach(i=>i.classList.remove('selected'));if(items[n])items[n].classList.add('selected');}
    else if(e.key==='ArrowUp'){e.preventDefault();const n=Math.max(cur-1,0);items.forEach(i=>i.classList.remove('selected'));if(items[n])items[n].classList.add('selected');}
    else if(e.key==='Enter'){e.preventDefault();const sel=items.find(i=>i.classList.contains('selected'));if(sel)sel.click();else this._doSearch();}
    else if(e.key==='Escape'){this._closeDropdown();}
  }

  async _doSearch() {
    const input=document.getElementById(`ai_${this.id}`);
    const query=input?.value?.trim();
    if(!query){return;}
    if(!S.online){
      await checkApi();
      if(!S.online){toast('백엔드에 연결되지 않았습니다.','error');return;}
    }

    const dd=document.getElementById(`dd_${this.id}`);
    dd.innerHTML='<div class="search-loading">🔍 검색 중...</div>';
    dd.classList.add('open');

    try{
      const r=await fetch(`${API}/search-address`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({query,limit:6}),signal:AbortSignal.timeout(8000)
      });
      const d=await r.json();
      console.log('[검색]', query, '->', d);
      if(!r.ok){
        const msg=d.detail||'검색 실패';
        // 503 = API 키 없음
        if(r.status===503){
          dd.innerHTML=`<div class="search-no-result">⚠️ API 키 미설정<br><small style="color:#cc8888">backend/.env에 KAKAO_API_KEY를 추가하고<br>백엔드를 재시작하세요</small></div>`;
        } else {
          dd.innerHTML=`<div class="search-no-result">⚠️ ${msg}</div>`;
        }
        return;
      }
      // 빈 결과일 때 debug 힌트 표시
      if(d.debug){
        console.warn('[검색 진단]', d.debug);
        if(!d.debug.kakao_key_set){
          dd.innerHTML=`<div class="search-no-result">⚠️ KAKAO_API_KEY 미설정<br><small style="color:#cc8888">backend/.env 파일에<br>KAKAO_API_KEY=키값 을 추가하고<br>백엔드를 재시작하세요</small></div>`;
          return;
        }
      }
      this._renderResults(d.results||[]);
    }catch(e){
      console.error('[검색 오류]', e);
      dd.innerHTML=`<div class="search-no-result">검색 실패: ${e.message}<br><small style="color:#445566">백엔드 터미널에서 오류를 확인하세요.</small></div>`;
    }
  }

  _renderResults(results) {
    const dd=document.getElementById(`dd_${this.id}`);
    if(!results.length){
      dd.innerHTML=`<div class="search-no-result">
        검색 결과 없음<br>
        <small style="color:#445566">다른 검색어를 시도하거나<br>
        백엔드 터미널에서 오류를 확인하세요</small><br>
        <small style="color:#334466"><a href="http://127.0.0.1:8000/api/debug-key" target="_blank" style="color:#5577ff">API 키 상태 확인 →</a></small>
      </div>`;
      return;
    }
    dd.innerHTML=results.map((r,i)=>`
      <div class="search-item" onclick="S.addrSearches['${this.id}']._selectItem(${i})" data-idx="${i}">
        <div class="search-item-name">${r.name||r.address}</div>
        ${r.name&&r.address&&r.name!==r.address?`<div class="search-item-addr">${r.address}</div>`:''}
        ${r.category?`<div class="search-item-cat">${r.category}</div>`:''}
      </div>`).join('');
    dd._results=results;
  }

  _selectItem(idx) {
    const dd=document.getElementById(`dd_${this.id}`);
    const results=dd._results||[];
    const item=results[idx];
    if(!item)return;
    this.selected=item;
    const input=document.getElementById(`ai_${this.id}`);
    input.value=item.name&&item.name!==item.address
      ?`${item.name} (${item.address})`
      :item.address;
    this._setBadge(`✓ ${item.lat.toFixed(5)}, ${item.lng.toFixed(5)}`,'ok');
    this._closeDropdown();
    // ★ 항상 지도에서 해당 위치 표시 (onSelect 콜백 호출 전)
    this._showOnMap(item);
    if(this.options.onSelect) this.options.onSelect(item);
  }

  _showOnMap(item) {
    // 기본 미리보기: 지도 이동 (각 인스턴스별 onSelect에서 마커 추가)
    if(item?.lat && item?.lng) {
      map.setView([item.lat, item.lng], 15);
    }
  }

  _clearSelected(){
    this.selected=null;
    this._setBadge('','');
    if(this.options.onClear) this.options.onClear();
  }

  _setBadge(text,cls){
    const cb=document.getElementById(`cb_${this.id}`);
    if(!cb)return;
    cb.textContent=text;
    cb.className=`coord-badge${cls?' '+cls:''}`;
  }

  _showDropdown(){
    const dd=document.getElementById(`dd_${this.id}`);
    if(dd&&dd.innerHTML.trim()&&!dd.innerHTML.includes('search-loading'))
      dd.classList.add('open');
  }

  _closeDropdown(){
    const dd=document.getElementById(`dd_${this.id}`);
    if(dd)dd.classList.remove('open');
  }

  getValue(){ return this.selected; }

  setValue(item){
    if(!item)return;
    this.selected=item;
    const input=document.getElementById(`ai_${this.id}`);
    if(input) input.value=item.name&&item.name!==item.address
      ?`${item.name} (${item.address})`:item.address;
    this._setBadge(`✓ ${item.lat.toFixed(5)}, ${item.lng.toFixed(5)}`,'ok');
  }

  clear(){
    this.selected=null;
    const input=document.getElementById(`ai_${this.id}`);
    if(input) input.value='';
    this._setBadge('','');
    this._closeDropdown();
  }
}

const dz=document.getElementById('dropzone'),fi=document.getElementById('fileInput');
function triggerFile(){fi.click();}
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));

async function uploadFile(file){
  if(!S.online){await checkApi();}
  if(!S.online){toast('백엔드에 연결할 수 없습니다.','error');return;}
  showLov('Excel 파싱 중...',file.name);
  try{
    const form=new FormData();form.append('file',file);
    const r=await fetch(`${API}/upload`,{method:'POST',body:form,signal:AbortSignal.timeout(30000)});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'업로드 실패');
    S.passengers=d.passengers.filter(p=>p.geocoded);
    renderPaxPreview(d,file.name);
    renderPaxMarkers();
    toast(`${d.success}명 로드 완료${d.failed>0?`\n좌표 실패 ${d.failed}건`:''}`, 'success');
  }catch(e){toast(e.message.includes('fetch')?'서버 연결 실패':`업로드 오류: ${e.message}`,'error');}
  finally{hideLov();}
}

function renderPaxPreview(d,fname){
  dz.classList.add('loaded');
  document.getElementById('dzText').textContent=`✅ ${fname}  (${d.success}명)`;
  document.getElementById('paxPreview').innerHTML=`
    <div style="max-height:140px;overflow-y:auto;margin-top:8px">
      <table class="mini-tbl">
        <thead><tr><th>이름</th><th>탑승지</th><th>인원</th><th>좌표</th></tr></thead>
        <tbody>${d.passengers.map(p=>`
          <tr>
            <td>${p.name}</td>
            <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left" title="${p.address}">${p.address}</td>
            <td>${p.passenger_count}</td>
            <td class="${p.geocoded?'ok':'fail'}">${p.geocoded?'✓':'✗'}</td>
          </tr>`).join('')}</tbody>
      </table>
    </div>
    <div style="font-size:10px;color:#445566;margin-top:3px;text-align:right">
      총 ${d.total}명 | 성공 ${d.success}건${d.failed>0?` <span style="color:#cc4466">/ 실패 ${d.failed}건</span>`:''}
    </div>`;
}

function renderPaxMarkers(){
  layerPax.clearLayers();
  const bounds=[];
  S.passengers.forEach(p=>{
    const m=L.circleMarker([p.lat,p.lng],{radius:7,color:'#7eb3ff',fillColor:'#3355ee',fillOpacity:.85,weight:2})
      .bindPopup(`<div><div class="pop-name">👤 ${p.name}</div><div class="pop-row">${p.address}</div><div class="pop-row">인원: <b style="color:#ffbb44">${p.passenger_count}명</b></div></div>`);
    layerPax.addLayer(m);bounds.push([p.lat,p.lng]);
  });
  if(bounds.length)map.fitBounds(bounds,{padding:[50,50]});
}

async function addVehicle(){
  const busId=document.getElementById('vBusId').value.trim()||`Bus${S.vehicles.length+1}`;
  const cap=parseInt(document.getElementById('vCap').value)||45;
  const as=S.addrSearches['addFormAddrWrap'];
  const sel=as?.getValue();

  if(S.vehicles.find(v=>v.bus_id===busId)){toast('이미 존재하는 버스 ID','warn');return;}
  if(!sel){toast('출발지를 검색하여 선택해주세요.','warn');return;}

  S.vehicles.push({
    bus_id:busId,capacity:cap,
    start_location:sel.address||(sel.name||''),
    end_location:'',
    start_lat:sel.lat,start_lng:sel.lng
  });

  document.getElementById('vBusId').value=`Bus${S.vehicles.length+1}`;
  document.getElementById('vCap').value='';
  as.clear();

  layerPreview.clearLayers(); // 미리보기 마커 제거
  renderVList();
  renderVehicleMarkers();    // 등록된 차량 마커 표시
}

function removeVehicle(busId){
  S.vehicles=S.vehicles.filter(v=>v.bus_id!==busId);
  if(S.editingId===busId)S.editingId=null;
  // 편집 중 폼 제거
  const editEl=document.getElementById(`ef_${busId}`);
  if(editEl)editEl.remove();
  renderVList();renderVehicleMarkers();
}

function startEdit(busId){
  S.editingId=(S.editingId===busId)?null:busId;
  renderVList();
  // 편집 열릴 때 AddressSearch 초기화
  if(S.editingId===busId){
    const v=S.vehicles.find(v=>v.bus_id===busId);
    if(!v)return;
    const editSearchId=`ef_addr_${busId}`;
    // 약간의 딜레이로 DOM 생성 후 초기화
    setTimeout(()=>{
      const as=new AddressSearch(editSearchId,{
        placeholder:'새 출발지 검색',
        onSelect:item=>{
          // ★ previewLayer에 표시 (layerVehicle 건드리지 않음)
          layerPreview.clearLayers();
          const vColor=COLORS[S.vehicles.indexOf(v)%COLORS.length];
          const icon=L.divIcon({
            html:`<div style="background:${vColor};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)">🚌</div>`,
            iconSize:[32,32],iconAnchor:[16,16],className:''

              <div class="pop-name" style="color:${vColor}">🚌 ${v.bus_id} 새 출발지</div>

    },50);

async function saveEdit(busId){
  const v=S.vehicles.find(v=>v.bus_id===busId);
  if(!v)return;
  const newCap=parseInt(document.getElementById(`eCap_${busId}`)?.value)||v.capacity;
  const editSearchId=`ef_addr_${busId}`;
  const as=S.addrSearches[editSearchId];
  const sel=as?.getValue();

  v.capacity=newCap;
  if(sel){
    v.start_location=sel.address||(sel.name||v.start_location);
    v.start_lat=sel.lat;v.start_lng=sel.lng;
  }
  S.editingId=null;
  renderVList();renderVehicleMarkers();
  toast(`${busId} 수정 완료`,'success');
}

async function generateRoutes(){
  if(!S.passengers.length){toast('승객 데이터를 먼저 업로드하세요.','error');return;}
  if(!S.vehicles.length){toast('차량을 1대 이상 추가하세요.','error');return;}

  const destSel=S.addrSearches['destAddrWrap']?.getValue();
  if(!destSel){toast('도착지를 검색하여 선택해주세요.','error');return;}

  // 좌표 없는 차량 체크
  const noCoord=S.vehicles.filter(v=>!v.start_lat||!v.start_lng);
  if(noCoord.length){toast(`좌표 미확인 차량: ${noCoord.map(v=>v.bus_id).join(', ')}\n출발지를 검색으로 설정해주세요.`,'warn');return;}

  const totalPax=S.passengers.reduce((s,p)=>s+p.passenger_count,0);
  const totalCap=S.vehicles.reduce((s,v)=>s+v.capacity,0);
  if(totalPax>totalCap){toast(`⚠️ 총 승객(${totalPax}명) > 총 정원(${totalCap}명)`,'warn');return;}

  ['progPanel','resultPanel','detailPanel'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('progPanel').style.display='block';
  renderStepList(STEPS);setProgress(5,'초기화...');
  document.getElementById('genBtn').disabled=true;
  showLov('최적 노선 계산 중...','OR-Tools VRP Solver');

  try{
    const payload={
      passengers:S.passengers,
      vehicles:S.vehicles,
      arrival_time:document.getElementById('arrivalTime').value,
      destination:destSel.address||(destSel.name||''),
      destination_lat:destSel.lat,
      destination_lng:destSel.lng
    };

    setStep(0,'active');await sleep(200);
    setStep(0,'done');setStep(1,'active');setProgress(20,'매트릭스 생성 중...');await sleep(150);
    setStep(1,'done');setStep(2,'active');setProgress(40,'Solver 실행 중...');

    const r=await fetch(`${API}/generate-route`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),signal:AbortSignal.timeout(90000)
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'노선 생성 실패');

    setStep(2,'done');setStep(3,'active');setProgress(65,'도로 시간 정교화...');await sleep(200);
    setStep(3,'done');setStep(4,'active');setProgress(80,'탑승시간 계산...');await sleep(150);
    setStep(4,'done');setStep(5,'active');setProgress(90,'지도 렌더링...');

    S.routes=d.routes;S.destination=d.destination;S.summary=d.summary;

    layerPax.clearLayers();layerVehicle.clearLayers();layerDest.clearLayers();
    layerRoute.clearLayers();layerStop.clearLayers();layerPreview.clearLayers();ML.lines=[];

    renderRouteMap(d);
    renderResultPanel(d);
    renderDetail(d.routes);
    renderRtabs(d.routes);

    setStep(5,'done');setProgress(100,'완료!');
    toast(`✅ ${d.routes.length}개 노선 생성\n총 ${d.summary.total_passengers}명`,'success');
  }catch(e){
    console.error('[노선생성 오류]',e);
    toast(`오류: ${e.message}`,'error');
  }finally{hideLov();document.getElementById('genBtn').disabled=false;}
}

// ═══════════════════════════════════════════════
// 지도 렌더링
// ═══════════════════════════════════════════════
function renderRouteMap(data){
  const dest    = data.destination;
  const bounds  = [];
  const hasOSRM = data.matrix_source && data.matrix_source.startsWith('osrm');

  // ── 도착지 마커 ────────────────────────────────────────────────
  if(dest?.lat && dest?.lng){
    const destIcon = L.divIcon({
      html:`<div style="background:linear-gradient(135deg,#ff3366,#cc1144);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.5)">🏁</div>`,
      iconSize:[36,36], iconAnchor:[18,18], className:''
    });
    L.marker([dest.lat,dest.lng],{icon:destIcon})
      .bindPopup(`<div>
        <div class="pop-name">🏁 도착지</div>
        <div class="pop-row">${dest.address}</div>
        <div class="pop-time">⏰ ${dest.arrival_time}</div>
        <div class="pop-row" style="font-size:10px;color:${hasOSRM?'#22cc77':'#ffaa33'}">
          ${hasOSRM?'✅ 실제 도로 경로':'⚠ 직선 경로 (OSRM 미설정)'}
        </div>
      </div>`)
      .addTo(layerDest);
    bounds.push([dest.lat,dest.lng]);
  }

  // ── 버스별 렌더링 ───────────────────────────────────────────────
  data.routes.forEach((route,ri)=>{
    const color = COLORS[ri % COLORS.length];

    // 픽업 정류장 마커
    route.stops.forEach(stop=>{
      if(stop.type !== 'pickup') return;
      const lat = parseFloat(stop.lat), lng = parseFloat(stop.lng);
      if(isNaN(lat)||isNaN(lng)){ console.warn('[지도] 좌표 없음:', stop.name); return; }
      bounds.push([lat,lng]);
      const icon = L.divIcon({
        html:`<div style="background:${color};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:bold;border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.5)">${stop.pickup_order||'?'}</div>`,
        iconSize:[26,26], iconAnchor:[13,13], className:''
      });
      L.marker([lat,lng],{icon})
        .bindPopup(`<div>
          <div class="pop-bus" style="background:${color}">${route.bus_id}</div>
          <div class="pop-name">👤 ${stop.name}</div>
          <div class="pop-row">${stop.address}</div>
          <div class="pop-time">⏰ ${stop.pickup_time||'-'}</div>
          <div class="pop-row">탑승: <b style="color:#ffbb44">${stop.passenger_count}명</b></div>
        </div>`)
        .addTo(layerStop);
    });

    // ★ 경로 Polyline 그리기
    const polylines = route.polylines;

    if(polylines && polylines.length > 0){
      // OSRM 실제 도로: 구간별로 개별 Polyline
      polylines.forEach(segCoords=>{
        if(!segCoords || segCoords.length < 2) return;
        const line = L.polyline(segCoords,{
          color, weight:3.5, opacity:0.85,
          lineCap:'round', lineJoin:'round', smoothFactor:1
        });
        layerRoute.addLayer(line);
        ML.lines.push({line, idx:ri});
        segCoords.forEach(c=>bounds.push(c));
      });
    } else {
      // polylines 없음 → 직선 fallback (파선으로 구분)
      console.warn('[지도]', route.bus_id, 'polylines 없음 → 직선 fallback');
      const lineCoords=[];
      route.stops.forEach(s=>{
        if(s.type !== 'pickup') return;
        const lat=parseFloat(s.lat), lng=parseFloat(s.lng);
        if(!isNaN(lat)&&!isNaN(lng)) lineCoords.push([lat,lng]);
      });
      if(dest?.lat&&dest?.lng) lineCoords.push([dest.lat,dest.lng]);
      if(lineCoords.length>=2){
        const line=L.polyline(lineCoords,{
          color, weight:2.5, opacity:0.6,
          lineCap:'round', lineJoin:'round', dashArray:'8,5'
        });
        layerRoute.addLayer(line);
        ML.lines.push({line, idx:ri});
      }
    }
  });

  // OSRM 사용 여부 알림 (첫 생성 시)
  if(data.routes.length > 0 && !window._routeAlerted){
    window._routeAlerted = true;
    const src = data.matrix_source || 'haversine';
    if(src === 'haversine'){
      setTimeout(()=>toast('⚠ 직선 경로 표시 중\n실제 도로 경로: .env에 OSRM_BASE_URL 설정', 'warn'), 500);
    } else {
      setTimeout(()=>toast('✅ 실제 도로 기반 경로', 'info'), 500);
    }
  }

  renderVehicleMarkers();
  if(bounds.length) map.fitBounds(bounds,{padding:[50,50]});
  else map.setView([37.5665,126.9780],10);
}

function renderRtabs(routes){
  document.getElementById('routePanel').style.display='block';
  document.getElementById('rtabs').innerHTML=`
    <div class="rtab active" onclick="filterTab(-1,this)" style="border-color:#5533ee;color:#aabbee">전체</div>
    ${routes.map((r,i)=>`
      <div class="rtab" onclick="filterTab(${i},this)" style="border-color:${COLORS[i%COLORS.length]}44">
        <span style="color:${COLORS[i%COLORS.length]}">●</span>
        ${r.bus_id} — ${r.total_passengers}명 / ${r.departure_time} 출발
      </div>`).join('')}`;
}
function filterTab(idx,el){
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ML.lines.forEach(({line,idx:li})=>line.setStyle(idx===-1||li===idx?{opacity:.9,weight:4.5}:{opacity:.1,weight:2}));
}

// ═══════════════════════════════════════════════
// 결과 / 상세 패널
// ═══════════════════════════════════════════════
function renderResultPanel(data){
  document.getElementById('resultPanel').style.display='block';
  const dep=data.routes.reduce((m,r)=>(!m||r.departure_time<m)?r.departure_time:m,'');
  document.getElementById('sumGrid').innerHTML=`
    <div class="sum-card"><div class="sum-val" style="color:#22cc77">${data.summary.total_passengers}</div><div class="sum-lbl">총 탑승객</div></div>
    <div class="sum-card"><div class="sum-val">${data.summary.total_buses}</div><div class="sum-lbl">운행 버스</div></div>
    <div class="sum-card"><div class="sum-val" style="font-size:15px">${dep||'--:--'}</div><div class="sum-lbl">최초 출발</div></div>
    <div class="sum-card"><div class="sum-val" style="color:#ff6633;font-size:15px">${data.destination.arrival_time}</div><div class="sum-lbl">도착지 도착</div></div>`;
}

function renderDetail(routes){
  document.getElementById('detailPanel').style.display='block';
  document.getElementById('detailList').innerHTML=routes.map((r,ri)=>{
    const c=COLORS[ri%COLORS.length];
    const pickups=r.stops.filter(s=>s.type==='pickup');
    return `<div style="margin-bottom:10px;border:1px solid ${c}33;border-radius:8px;overflow:hidden">
      <div style="background:${c}22;padding:6px 10px;display:flex;align-items:center;justify-content:space-between">
        <span style="color:${c};font-weight:bold;font-size:12px">🚌 ${r.bus_id}</span>
        <span style="font-size:10px;color:#8899bb">${r.departure_time}→${r.arrival_time} | ${r.total_duration_min||0}분 | ${r.total_passengers}명</span>
      </div>
      ${pickups.length===0?`<div style="padding:8px 12px;font-size:11px;color:#556677">배정된 승객 없음</div>`:''}
      ${pickups.map((s,si)=>`
        <div style="display:flex;align-items:center;padding:4px 10px;gap:8px;font-size:11px;border-bottom:1px solid #151525">
          <span style="background:${c};color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">${si+1}</span>
          <span style="flex:1;color:#ccddee">${s.name}</span>
          <span style="color:#778899;flex:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.address}</span>
          <span style="color:#44dd88;font-weight:bold;flex-shrink:0">${s.pickup_time||'-'}</span>
          <span style="color:#ffbb44;flex-shrink:0">${s.passenger_count}명</span>
        </div>`).join('')}
      <div style="display:flex;align-items:center;padding:4px 10px;gap:8px;font-size:11px;background:#1a1a30">
        <span style="width:20px;text-align:center">🏁</span>
        <span style="flex:1;color:#ff4466;font-weight:bold">도착지</span>
        <span style="color:#ff4466;font-weight:bold">${r.arrival_time}</span>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// Excel Export
// ═══════════════════════════════════════════════
async function exportExcel(){
  if(!S.routes){toast('노선을 먼저 생성하세요.','warn');return;}
  showLov('Excel 생성 중...','3시트 작성');
  try{
    const r=await fetch(`${API}/export`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({routes:S.routes,destination:S.destination,summary:S.summary}),signal:AbortSignal.timeout(30000)});
    if(!r.ok)throw new Error('Export 실패');
    const uint8=Array.from(new Uint8Array(await r.arrayBuffer()));
    const today=new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g,'-').replace(/-$/,'');
    const res=await ipc.invoke('save-file',{defaultName:`DaOnRoad_${today}.xlsx`,data:uint8});
    if(res?.success)toast(`✅ 저장 완료\n${res.path}`,'success');
  }catch(e){toast(`Export 오류: ${e.message}`,'error');}
  finally{hideLov();}
}

// ═══════════════════════════════════════════════
// 진행 / 유틸
// ═══════════════════════════════════════════════
function renderStepList(steps){document.getElementById('stepList').innerHTML=steps.map((s,i)=>`<div class="step-row" id="sr_${i}"><span id="si_${i}">○</span> ${s}</div>`).join('');}
function setStep(i,st){const r=document.getElementById(`sr_${i}`),ic=document.getElementById(`si_${i}`);if(!r)return;r.className=`step-row ${st}`;ic.textContent=st==='done'?'✅':st==='active'?'⟳':'○';}
function setProgress(p,lbl){document.getElementById('progFill').style.width=p+'%';document.getElementById('progPct').textContent=p+'%';if(lbl)document.getElementById('progLbl').textContent=lbl;}
function showLov(t,s){document.getElementById('lovText').textContent=t||'처리 중...';document.getElementById('lovSub').textContent=s||'';document.getElementById('lov').classList.add('show');}
function hideLov(){document.getElementById('lov').classList.remove('show');}
function toast(msg,type='info'){const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;document.body.appendChild(el);setTimeout(()=>{el.style.animation='tIn .3s ease reverse';setTimeout(()=>el.remove(),300);},3700);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function resetAll(){
  Object.assign(S,{passengers:[],vehicles:[],routes:null,destination:null,summary:null,editingId:null});
  [layerPax,layerVehicle,layerDest,layerRoute,layerStop,layerPreview].forEach(l=>l.clearLayers());
  ML.lines=[];
  map.setView([37.5665,126.9780],10);
  document.getElementById('paxPreview').innerHTML='';
  dz.classList.remove('loaded');
  document.getElementById('dzText').textContent='Excel 파일 클릭 또는 드래그';
  S.addrSearches['addFormAddrWrap']?.clear();
  S.addrSearches['destAddrWrap']?.clear();
  renderVList();
  ['progPanel','resultPanel','detailPanel','routePanel'].forEach(id=>document.getElementById(id).style.display='none');
  toast('초기화 완료','info');
}

renderVList();
</script>
